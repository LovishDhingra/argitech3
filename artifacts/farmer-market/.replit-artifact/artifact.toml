kind = "web"
previewPath = "/"
title = "Farmer Market Intelligence"
version = "1.0.0"
id = "artifacts/farmer-market"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23359

[services.development]
run = "pnpm --filter @workspace/farmer-market run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/farmer-market", "run", "build" ]
publicDir = "artifacts/farmer-market/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23359"
BASE_PATH = "/"
