databases:
  - name: farm-sphere-db
    plan: free
    databaseName: farm_sphere
    user: farm_sphere

services:
  - type: web
    name: farm-sphere-api
    env: node
    plan: free
    buildCommand: pnpm install --no-frozen-lockfile && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: farm-sphere-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: DATA_GOV_IN_API_KEY
        sync: false

  - type: web
    name: farm-sphere-web
    env: static
    buildCommand: pnpm install --no-frozen-lockfile && pnpm --filter @workspace/farmer-market run build
    staticPublishPath: artifacts/farmer-market/dist/public
    envVars:
      # REQUIRED: set this to your farm-sphere-api service URL, e.g.
      # https://farm-sphere-api.onrender.com
      # Without it, browser API calls hit the static-site origin and get
      # index.html back instead of JSON, causing a white screen after login.
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
